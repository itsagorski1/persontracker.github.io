services:
  - type: web
    name: persontracker-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeployTrigger: commit
    healthCheckPath: /healthz
    envVars:
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB
        value: persontracker
      - key: ALLOWED_ORIGINS
        sync: false
      - key: AUTH0_REQUIRED
        value: "true"
      - key: AUTH0_DOMAIN
        sync: false
      - key: AUTH0_AUDIENCE
        sync: false
